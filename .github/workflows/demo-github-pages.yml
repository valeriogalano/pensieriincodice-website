# Deploy del sito demo su GitHub Pages dal branch pic-theme
name: Deploy demo site to GitHub Pages

on:
  push:
    branches: ["pic-theme"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages-demo"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.156.0'
          extended: true

      - name: Install npm dependencies
        run: npm install

      - name: Build
        run: hugo --minify --baseURL "https://valeriogalano.github.io/pensieriincodice-website/"

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages