<footer class="fixed bottom-0 left-0 right-0 min-h-24 glass-sidebar border-t border-white/5 flex items-center px-8 z-50">
    <div class="max-w-7xl mx-auto w-full flex flex-col">
        <div class="player-main-row flex items-center w-full">
            <div class="player-info-col flex items-center space-x-4 w-1/4">
                <div id="player-image-container" class="w-12 h-12 bg-pod-orange rounded-lg hidden sm:flex items-center justify-center shadow-lg shadow-pod-orange/20 overflow-hidden">
                    <img id="player-image" src="{{ .Site.Params.podcast.image | absURL }}" class="object-cover w-full h-full">
                    <svg id="player-placeholder-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="hidden">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <line x1="12" y1="19" x2="12" y2="22" />
                    </svg>
                </div>
                <div id="player-info">
                    <a href="#" class="text-sm font-bold truncate max-w-[150px] md:max-w-[200px] hover:text-pod-orange transition-colors block" id="player-title" title="{{ .Site.Title }}">{{ .Site.Title }}</a>
                    <p class="text-[10px] text-pod-orange font-mono uppercase" id="player-status">Seleziona un episodio</p>
                </div>
                <div id="player-mobile-actions" class="flex items-center gap-2">
                    <button id="player-mini-play"
                        class="w-8 h-8 bg-white text-pod-black rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" id="player-mini-play-icon">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                    </button>
                    <button id="player-collapse-btn" class="text-pod-gray hover:text-white transition-colors" aria-label="Comprimi player">
                        <svg id="player-collapse-chevron" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition: transform 0.2s">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="player-controls-col flex-1 flex flex-col items-center px-12">
                <div class="flex items-center space-x-3 mb-2">
                    {{/* Previous episode */}}
                    <button id="player-episode-prev" disabled title="Episodio precedente"
                        class="text-pod-gray hover:text-white transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="19 20 9 12 19 4 19 20"/>
                            <polygon points="9 20 0 12 9 4 9 20"/>
                        </svg>
                    </button>
                    {{/* Previous chapter */}}
                    <button id="player-chapter-prev" disabled title="Capitolo precedente"
                        class="text-pod-gray hover:text-white transition-colors disabled:opacity-30 disabled:cursor-not-allowed hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="15 20 6 12 15 4 15 20"/>
                            <line x1="4" y1="4" x2="4" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                    {{/* Skip back 15s */}}
                    <button id="player-prev" disabled title="Indietro 15 secondi"
                        class="text-pod-gray hover:text-white transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 32 32">
                            <path d="M16 4 A12 12 0 1 0 28 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <polyline points="12,1 16,5 12,9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <text x="16" y="20" text-anchor="middle" font-size="9" font-weight="bold" fill="currentColor" font-family="monospace">15</text>
                        </svg>
                    </button>
                    {{/* Play/Pause */}}
                    <button id="player-play"
                        class="w-10 h-10 bg-white text-pod-black rounded-full flex items-center justify-center hover:scale-105 transition-transform shadow-xl">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" id="player-play-icon">
                            <polygon points="5 3 19 12 5 21 5 3" />
                        </svg>
                    </button>
                    {{/* Skip forward 30s */}}
                    <button id="player-next" disabled title="Avanti 30 secondi"
                        class="text-pod-gray hover:text-white transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                        <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 32 32">
                            <path d="M16 4 A12 12 0 1 1 4 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                            <polyline points="20,1 16,5 20,9" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <text x="16" y="20" text-anchor="middle" font-size="9" font-weight="bold" fill="currentColor" font-family="monospace">30</text>
                        </svg>
                    </button>
                    {{/* Next chapter */}}
                    <button id="player-chapter-next" disabled title="Capitolo successivo"
                        class="text-pod-gray hover:text-white transition-colors disabled:opacity-30 disabled:cursor-not-allowed hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="9 4 18 12 9 20 9 4"/>
                            <line x1="20" y1="4" x2="20" y2="20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                    {{/* Next episode */}}
                    <button id="player-episode-next" disabled title="Episodio successivo"
                        class="text-pod-gray hover:text-white transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <polygon points="5 4 15 12 5 20 5 4"/>
                            <polygon points="15 4 24 12 15 20 15 4"/>
                        </svg>
                    </button>
                </div>
                <div class="w-full flex items-center space-x-3">
                    <span class="text-[10px] font-mono text-pod-gray" id="player-current-time">0:00</span>
                    <div class="flex-1 h-1 bg-white/10 rounded-full overflow-hidden relative group cursor-pointer" id="player-progress-bar">
                        <div class="absolute inset-0 bg-pod-orange rounded-full" style="width: 0%" id="player-progress"></div>
                    </div>
                    <span class="text-[10px] font-mono text-pod-gray" id="player-duration">0:00</span>
                </div>
            </div>
            <div class="player-right-col flex items-center justify-end space-x-4 w-1/4">
                <div class="flex items-center space-x-2 bg-white/5 rounded-lg px-2 py-1">
                    <select id="player-speed" class="bg-transparent text-[10px] font-mono text-white focus:outline-none cursor-pointer">
                        <option value="0.5" class="bg-pod-black">0.5x</option>
                        <option value="0.8" class="bg-pod-black">0.8x</option>
                        <option value="1" class="bg-pod-black" selected>1.0x</option>
                        <option value="1.2" class="bg-pod-black">1.2x</option>
                        <option value="1.5" class="bg-pod-black">1.5x</option>
                        <option value="2" class="bg-pod-black">2.0x</option>
                        <option value="2.5" class="bg-pod-black">2.5x</option>
                        <option value="3" class="bg-pod-black">3.0x</option>
                    </select>
                </div>
                <button id="toggle-chapters" class="text-pod-gray hover:text-white transition-colors hidden" title="Capitoli">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                </button>
                <button id="toggle-transcript" class="text-pod-gray hover:text-white transition-colors hidden" title="Trascrizione">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                </button>
            </div>
        </div>
        <div id="player-chapters-container" class="hidden w-full mt-4 max-h-48 overflow-y-auto bg-pod-black/50 rounded-lg p-4 scrollbar-thin scrollbar-thumb-pod-orange">
            <h6 class="text-xs font-bold text-pod-gray uppercase mb-2">Capitoli</h6>
            <div id="player-chapters-list" class="grid grid-cols-1 md:grid-cols-2 gap-2">
                <!-- Chapters will be injected here -->
            </div>
        </div>
        <div id="player-transcript-container" class="hidden w-full mt-4 max-h-48 overflow-y-auto bg-pod-black/50 rounded-lg p-4 scrollbar-thin scrollbar-thumb-pod-orange">
            <h6 class="text-xs font-bold text-pod-gray uppercase mb-2">Trascrizione</h6>
            <div id="player-transcript-list" class="space-y-1">
                <!-- Transcript will be injected here -->
            </div>
        </div>
    </div>
    <audio id="audio-player" preload="none"></audio>
</footer>

<script>
(function() {
    const audio = document.getElementById('audio-player');
    const playBtn = document.getElementById('player-play');
    const playIcon = document.getElementById('player-play-icon');
    const titleEl = document.getElementById('player-title');
    const statusEl = document.getElementById('player-status');
    const progressBar = document.getElementById('player-progress-bar');
    const progress = document.getElementById('player-progress');
    const currentTimeEl = document.getElementById('player-current-time');
    const durationEl = document.getElementById('player-duration');
    const speedSelect = document.getElementById('player-speed');
    const chaptersContainer = document.getElementById('player-chapters-container');
    const chaptersList = document.getElementById('player-chapters-list');
    const toggleChaptersBtn = document.getElementById('toggle-chapters');
    const transcriptContainer = document.getElementById('player-transcript-container');
    const transcriptList = document.getElementById('player-transcript-list');
    const toggleTranscriptBtn = document.getElementById('toggle-transcript');
    const chapterPrevBtn = document.getElementById('player-chapter-prev');
    const chapterNextBtn = document.getElementById('player-chapter-next');
    const episodePrevBtn = document.getElementById('player-episode-prev');
    const episodeNextBtn = document.getElementById('player-episode-next');

    let currentChapters = [];
    let currentTranscript = [];
    let currentTranscriptIndex = -1;

    const collapseBtn = document.getElementById('player-collapse-btn');
    const miniPlayBtn = document.getElementById('player-mini-play');
    const miniPlayIcon = document.getElementById('player-mini-play-icon');
    const footerContainer = document.getElementById('footer-player-container');

    const playSvg = '<polygon points="5 3 19 12 5 21 5 3" />';
    const pauseSvg = '<rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" />';

    function updatePlayIcons(svg) {
        playIcon.innerHTML = svg;
        if (miniPlayIcon) miniPlayIcon.innerHTML = svg;
    }

    // Collapse toggle
    if (localStorage.getItem('pic_player_collapsed') === 'true') {
        footerContainer.classList.add('player-collapsed');
    }
    if (collapseBtn) {
        collapseBtn.addEventListener('click', function() {
            const collapsed = footerContainer.classList.toggle('player-collapsed');
            localStorage.setItem('pic_player_collapsed', collapsed);
        });
    }
    if (miniPlayBtn) {
        miniPlayBtn.addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                updatePlayIcons(pauseSvg);
                statusEl.textContent = 'Ora in riproduzione';
            } else {
                audio.pause();
                updatePlayIcons(playSvg);
                statusEl.textContent = 'In pausa';
            }
        });
    }

    function formatTime(s) {
        if (isNaN(s)) return '0:00';
        const m = Math.floor(s / 60);
        const sec = Math.floor(s % 60);
        return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    window.playEpisode = function(url, title, image, chaptersUrl, transcriptUrl, permalink) {
        // Remove quotes from jsonify if present
        if (title && title.startsWith('"') && title.endsWith('"')) {
            title = title.substring(1, title.length - 1);
        }

        if (titleEl) {
            titleEl.textContent = title;
            titleEl.title = title;
            titleEl.href = permalink || '#';
        }

        if (audio.src !== url) {
            audio.src = url;
            audio.load();
        }

        // Apply current playback rate if selected
        if (speedSelect) {
            audio.playbackRate = parseFloat(speedSelect.value);
        }

        // Use a promise to handle play() and ensure it starts
        const playPromise = audio.play();
        if (playPromise !== undefined) {
            playPromise.then(_ => {
                updatePlayIcons(pauseSvg);
                statusEl.textContent = 'Ora in riproduzione';
            }).catch(error => {
                console.log("Autoplay prevented:", error);
                updatePlayIcons(playSvg);
                statusEl.textContent = 'Pronto a riprodurre';
            });
        }
        
        const playerImg = document.getElementById('player-image');
        const playerPlaceholder = document.getElementById('player-placeholder-icon');
        if (image) {
            playerImg.src = image;
            playerImg.classList.remove('hidden');
            playerPlaceholder.classList.add('hidden');
        } else {
            // Use default placeholder if no image provided
            playerImg.src = "{{ .Site.Params.podcast.image | absURL }}";
            playerImg.classList.remove('hidden');
            playerPlaceholder.classList.add('hidden');
        }

        // Load chapters if available
        if (chaptersUrl) {
            fetch(chaptersUrl)
                .then(response => response.json())
                .then(data => {
                    if (data && data.chapters) {
                        renderChapters(data.chapters);
                    } else {
                        hideChapters();
                    }
                })
                .catch(err => {
                    console.error("Error loading chapters:", err);
                    hideChapters();
                });
        } else {
            hideChapters();
        }

        // Load transcript if available
        if (transcriptUrl) {
            fetch(transcriptUrl)
                .then(response => response.text())
                .then(text => renderTranscript(parseSRT(text)))
                .catch(err => {
                    console.error("Error loading transcript:", err);
                    hideTranscript();
                });
        } else {
            hideTranscript();
        }

        updateEpisodeButtons();

        // Save state for persistence
        localStorage.setItem('pic_player_state', JSON.stringify({
            url: url,
            title: title,
            image: image || "{{ .Site.Params.podcast.image | absURL }}",
            chaptersUrl: chaptersUrl,
            transcriptUrl: transcriptUrl || null,
            currentTime: audio.currentTime,
            shouldPlay: true
        }));
    };

    function renderChapters(chapters) {
        currentChapters = chapters;
        currentChapterIndex = -1;
        chaptersList.innerHTML = '';
        chapters.forEach((chapter, index) => {
            const div = document.createElement('div');
            div.className = 'flex items-center justify-between text-[10px] p-2 rounded hover:bg-white/10 cursor-pointer group border border-white/5 transition-colors';
            div.dataset.chapterIndex = index;
            div.onclick = () => {
                audio.currentTime = chapter.startTime;
                if (audio.paused) audio.play();
            };
            
            div.innerHTML = `
                <div class="flex items-center space-x-2 truncate">
                    <span class="text-pod-orange font-mono">${formatTime(chapter.startTime)}</span>
                    <span class="text-white group-hover:text-pod-orange transition-colors truncate">${chapter.title}</span>
                </div>
                ${chapter.img ? `<img src="${chapter.img}" class="h-4 w-4 rounded object-cover flex-shrink-0 ml-2">` : ''}
            `;
            chaptersList.appendChild(div);
        });
        toggleChaptersBtn.classList.remove('hidden');
        chapterPrevBtn.classList.remove('hidden');
        chapterNextBtn.classList.remove('hidden');
        chapterPrevBtn.disabled = false;
        chapterNextBtn.disabled = false;
    }

    function hideChapters() {
        currentChapters = [];
        chaptersList.innerHTML = '';
        chaptersContainer.classList.add('hidden');
        toggleChaptersBtn.classList.add('hidden');
        chapterPrevBtn.classList.add('hidden');
        chapterNextBtn.classList.add('hidden');
    }

    function parseSRT(text) {
        const segments = [];
        const blocks = text.trim().split(/\n\n+/);
        for (const block of blocks) {
            const lines = block.trim().split('\n');
            if (lines.length < 3) continue;
            const m = lines[1].match(/(\d{2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/);
            if (!m) continue;
            const start = +m[1] * 3600 + +m[2] * 60 + +m[3] + +m[4] / 1000;
            const end   = +m[5] * 3600 + +m[6] * 60 + +m[7] + +m[8] / 1000;
            const segText = lines.slice(2).join(' ').trim();
            if (segText) segments.push({ start, end, text: segText });
        }
        return segments;
    }

    function renderTranscript(segments) {
        currentTranscript = segments;
        currentTranscriptIndex = -1;
        transcriptList.innerHTML = '';
        segments.forEach((seg, index) => {
            const div = document.createElement('div');
            div.className = 'px-2 py-1 rounded cursor-pointer hover:bg-white/10 transition-colors text-[11px] leading-relaxed text-pod-gray';
            div.dataset.transcriptIndex = index;
            div.onclick = () => { audio.currentTime = seg.start; if (audio.paused) audio.play(); };
            div.innerHTML = `<span class="text-pod-orange font-mono mr-2 text-[9px]">${formatTime(seg.start)}</span>${seg.text}`;
            transcriptList.appendChild(div);
        });
        toggleTranscriptBtn.classList.remove('hidden');
    }

    function hideTranscript() {
        currentTranscript = [];
        currentTranscriptIndex = -1;
        transcriptList.innerHTML = '';
        transcriptContainer.classList.add('hidden');
        toggleTranscriptBtn.classList.add('hidden');
    }

    toggleChaptersBtn.addEventListener('click', () => {
        chaptersContainer.classList.toggle('hidden');
        if (!chaptersContainer.classList.contains('hidden')) {
            transcriptContainer.classList.add('hidden');
        }
    });

    toggleTranscriptBtn.addEventListener('click', () => {
        transcriptContainer.classList.toggle('hidden');
        if (!transcriptContainer.classList.contains('hidden')) {
            chaptersContainer.classList.add('hidden');
        }
    });

    // Restore state and periodic save
    const initPlayer = function() {
        const savedState = localStorage.getItem('pic_player_state');
        if (savedState) {
            const state = JSON.parse(savedState);
            // If already playing the same source, don't re-init everything to avoid clicks
            if (audio.src === state.url && !audio.paused) return;

            titleEl.textContent = state.title;
            statusEl.textContent = 'In pausa';
            
            const playerImg = document.getElementById('player-image');
            const playerPlaceholder = document.getElementById('player-placeholder-icon');
            if (state.image) {
                playerImg.src = state.image;
                playerImg.classList.remove('hidden');
                playerPlaceholder.classList.add('hidden');
            }
            
            if (audio.src !== state.url) {
                audio.src = state.url;
                audio.currentTime = state.currentTime || 0;
            }

            if (state.playbackRate) {
                speedSelect.value = state.playbackRate;
                audio.playbackRate = state.playbackRate;
            }

            if (state.chaptersUrl) {
                fetch(state.chaptersUrl)
                    .then(response => response.json())
                    .then(data => {
                        if (data && data.chapters) renderChapters(data.chapters);
                    });
            }
            if (state.transcriptUrl) {
                fetch(state.transcriptUrl)
                    .then(response => response.text())
                    .then(text => renderTranscript(parseSRT(text)))
                    .catch(() => {});
            }
            
            if (state.shouldPlay) {
                const playPromise = audio.play();
                if (playPromise !== undefined) {
                    playPromise.then(_ => {
                        updatePlayIcons(pauseSvg);
                        statusEl.textContent = 'Ora in riproduzione';
                    }).catch(error => {
                        console.log("Autoplay on restore prevented:", error);
                    });
                }
            }
        } else if (window.__playlist && window.__playlist.length > 0) {
            const ep = window.__playlist[0];

            if (titleEl) {
                titleEl.textContent = ep.title;
                titleEl.title = ep.title;
                titleEl.href = ep.permalink || '#';
            }
            statusEl.textContent = 'In pausa';

            const playerImg = document.getElementById('player-image');
            const playerPlaceholder = document.getElementById('player-placeholder-icon');
            if (ep.image) {
                playerImg.src = ep.image;
                playerImg.classList.remove('hidden');
                playerPlaceholder.classList.add('hidden');
            }

            audio.src = ep.audio;
            audio.load();

            if (ep.chapters) {
                fetch(ep.chapters)
                    .then(response => response.json())
                    .then(data => {
                        if (data && data.chapters) renderChapters(data.chapters);
                    })
                    .catch(() => {});
            }
            if (ep.transcript) {
                fetch(ep.transcript)
                    .then(response => response.text())
                    .then(text => renderTranscript(parseSRT(text)))
                    .catch(() => {});
            }

            updateEpisodeButtons();
        }
    };

    // Listened episodes history (localStorage: 'pic_listened_episodes' → array of audio URLs)
    function markListened(url) {
        if (!url) return;
        const key = 'pic_listened_episodes';
        let list = [];
        try { list = JSON.parse(localStorage.getItem(key)) || []; } catch(e) {}
        if (!list.includes(url)) {
            list.push(url);
            localStorage.setItem(key, JSON.stringify(list));
            applyListenedBadges();
        }
    }

    function isListened(url) {
        if (!url) return false;
        try {
            return (JSON.parse(localStorage.getItem('pic_listened_episodes')) || []).includes(url);
        } catch(e) { return false; }
    }

    function applyListenedBadges() {
        document.querySelectorAll('[data-audio]').forEach(card => {
            const url = card.dataset.audio;
            const existing = card.querySelector('.pic-listened-badge');
            if (isListened(url)) {
                if (!existing) {
                    const badge = document.createElement('span');
                    badge.className = 'pic-listened-badge absolute top-3 left-3 bg-green-600/90 text-white text-[9px] font-bold px-2 py-0.5 rounded-full flex items-center gap-1 z-10 pointer-events-none';
                    badge.innerHTML = '<svg width="8" height="8" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>&nbsp;Ascoltato';
                    card.appendChild(badge);
                }
            } else {
                if (existing) existing.remove();
            }
        });
    }

    audio.addEventListener('ended', function() {
        if (audio.src) markListened(audio.src);
    });

    // Use window load for first hit, and turbo:load for navigation (if needed, but permanent should handle it)
    window.addEventListener('load', function() { initPlayer(); applyListenedBadges(); });
    document.addEventListener('turbo:load', function() {
        applyListenedBadges();
    });

    // Periodically save current time and playing status
    setInterval(() => {
        if (!audio || !audio.src) return;
        const state = {
            url: audio.src,
            title: titleEl ? titleEl.textContent : "",
            image: document.getElementById('player-image').src,
            currentTime: audio.currentTime,
            shouldPlay: !audio.paused,
            playbackRate: audio.playbackRate,
            chaptersUrl: localStorage.getItem('pic_player_state') ? JSON.parse(localStorage.getItem('pic_player_state')).chaptersUrl : null,
            transcriptUrl: localStorage.getItem('pic_player_state') ? JSON.parse(localStorage.getItem('pic_player_state')).transcriptUrl : null
        };
        localStorage.setItem('pic_player_state', JSON.stringify(state));
    }, 2000);

    speedSelect.addEventListener('change', function() {
        audio.playbackRate = parseFloat(this.value);
    });

    playBtn.addEventListener('click', function() {
        if (audio.paused) {
            audio.play();
            updatePlayIcons(pauseSvg);
            statusEl.textContent = 'Ora in riproduzione';
        } else {
            audio.pause();
            updatePlayIcons(playSvg);
            statusEl.textContent = 'In pausa';
        }
    });

    let currentChapterIndex = -1;

    audio.addEventListener('timeupdate', function() {
        currentTimeEl.textContent = formatTime(audio.currentTime);
        if (audio.duration) {
            progress.style.width = (audio.currentTime / audio.duration * 100) + '%';
            if (audio.currentTime / audio.duration >= 0.9) markListened(audio.src);
        }
        if (currentChapters.length) {
            // Trova il capitolo corrente
            let idx = 0;
            for (let i = currentChapters.length - 1; i >= 0; i--) {
                if (audio.currentTime >= currentChapters[i].startTime) { idx = i; break; }
            }
            if (idx !== currentChapterIndex) {
                currentChapterIndex = idx;
                const items = chaptersList.querySelectorAll('[data-chapter-index]');
                items.forEach(el => {
                    const isActive = parseInt(el.dataset.chapterIndex) === idx;
                    el.classList.toggle('bg-pod-orange/20', isActive);
                    el.classList.toggle('border-pod-orange/40', isActive);
                    el.classList.toggle('border-white/5', !isActive);
                });
            }
        }

        if (currentTranscript.length) {
            let tIdx = -1;
            for (let i = currentTranscript.length - 1; i >= 0; i--) {
                if (audio.currentTime >= currentTranscript[i].start) { tIdx = i; break; }
            }
            if (tIdx !== currentTranscriptIndex) {
                currentTranscriptIndex = tIdx;
                const tItems = transcriptList.querySelectorAll('[data-transcript-index]');
                tItems.forEach(el => {
                    const isActive = parseInt(el.dataset.transcriptIndex) === tIdx;
                    el.classList.toggle('bg-pod-orange/20', isActive);
                    el.classList.toggle('text-white', isActive);
                    el.classList.toggle('text-pod-gray', !isActive);
                });
                if (tIdx >= 0 && !transcriptContainer.classList.contains('hidden')) {
                    const activeEl = transcriptList.querySelector(`[data-transcript-index="${tIdx}"]`);
                    if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            }
        }
    });

    progressBar.addEventListener('click', function(e) {
        if (audio.duration) {
            const rect = progressBar.getBoundingClientRect();
            const pct = (e.clientX - rect.left) / rect.width;
            audio.currentTime = pct * audio.duration;
        }
    });

    const prevBtn = document.getElementById('player-prev');
    const nextBtn = document.getElementById('player-next');

    prevBtn.addEventListener('click', function() {
        audio.currentTime = Math.max(0, audio.currentTime - 15);
    });

    nextBtn.addEventListener('click', function() {
        audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 30);
    });

    chapterPrevBtn.addEventListener('click', function() {
        if (!currentChapters.length) return;
        const curr = audio.currentTime;
        // trova il capitolo precedente (startTime < curr - 1s)
        let target = null;
        for (let i = currentChapters.length - 1; i >= 0; i--) {
            if (currentChapters[i].startTime < curr - 1) {
                target = currentChapters[i];
                break;
            }
        }
        if (target) audio.currentTime = target.startTime;
    });

    chapterNextBtn.addEventListener('click', function() {
        if (!currentChapters.length) return;
        const curr = audio.currentTime;
        const target = currentChapters.find(c => c.startTime > curr);
        if (target) audio.currentTime = target.startTime;
    });

    audio.addEventListener('loadedmetadata', function() {
        durationEl.textContent = formatTime(audio.duration);
        prevBtn.disabled = false;
        nextBtn.disabled = false;
    });

    function currentPlaylistIndex() {
        const playlist = window.__playlist || [];
        return playlist.findIndex(ep => audio.src && audio.src.includes(ep.audio));
    }

    function updateEpisodeButtons() {
        const playlist = window.__playlist || [];
        const idx = currentPlaylistIndex();
        episodePrevBtn.disabled = playlist.length === 0;
        episodeNextBtn.disabled = playlist.length === 0;
    }

    episodePrevBtn.addEventListener('click', function() {
        const playlist = window.__playlist || [];
        const idx = currentPlaylistIndex();
        const target = idx > 0 ? idx - 1 : playlist.length - 1;
        if (playlist[target]) {
            const ep = playlist[target];
            playEpisode(ep.audio, ep.title, ep.image, ep.chapters, ep.transcript, ep.permalink);
        }
    });

    episodeNextBtn.addEventListener('click', function() {
        const playlist = window.__playlist || [];
        const idx = currentPlaylistIndex();
        const target = (idx >= 0 && idx < playlist.length - 1) ? idx + 1 : 0;
        if (playlist[target]) {
            const ep = playlist[target];
            playEpisode(ep.audio, ep.title, ep.image, ep.chapters, ep.transcript, ep.permalink);
        }
    });

    updateEpisodeButtons();
})();
</script>
